name: "PR Validation"
on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3
      - name: "Validat File Extensions"
        run: |
          count=$(ls | grep -v ".txt" | grep -v ".md" | wc -l)
          if [ $count -gt 0 ]; then
            echo "Error: Only .txt and .md files are allowed."
            exit 1
          fi
          echo "File extensions are valid."
